<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Spinner</title>
    <link rel="stylesheet" href="style.css">
    <script src="javascript.js" defer></script>
</head>

<body>
    <div class="main-area">
        <div class="spin-container">
            <button id="spin-button">SPIN</button>
            <div id="current-number-display"></div>
            <div class="volume-control">Volume
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
            </div>
        </div>
        <div class="spin-history-container"><h6>Spin History</h6>
            <div class='spin-history-box' id="spin-1"></div>
            <div class='spin-history-box' id="spin-2"></div>
            <div class='spin-history-box' id="spin-3"></div>
            <div class='spin-history-box' id="spin-4"></div>
            <div class='spin-history-box' id="spin-5"></div>
            <div class='spin-history-box' id="spin-6"></div>
            <div class='spin-history-box' id="spin-7"></div>
            <div class='spin-history-box' id="spin-8"></div>
            <div class='spin-history-box' id="spin-9"></div>
            <div class='spin-history-box' id="spin-10"></div>
        </div>
    </div>
</body>
</html>
