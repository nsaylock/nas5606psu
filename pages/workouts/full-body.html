<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout</title>
    <link rel="stylesheet" href="style.css">
    <script src="javascript.js" defer></script>
</head>
<body>
<header>
    

    <button id="side-bar-button"></button>
    <div class="side-bar-label"></div>
    <aside id="side-bar">
        <button class="page-link" id="full-body">Full Body</button>
        <button class="page-link" id="push">Push</button>
        <button class="page-link" id="pull">Pull</button>
        <button class="page-link" id="legs">Legs</button>
        <button class="page-link" id="abs">Abs</button>
        <button class="page-link" id="bodyweight">Bodyweight</button>
        <button class="page-link" id="clear" style="background-color: rgb(182, 114, 13);">Clear List</button>
        
    </aside>


    <div id="page-title"><div class="page-title-text">Workout Generator</div></div>
</header>
<!-- Main Area -->
<nav id="selection-menu-home-page" class="flex">
    <button class="menu-buttons-home-page" id="full-body-main">Full Body</a>
    <button class="menu-buttons-home-page" id="push-main">Push</button>
    <button class="menu-buttons-home-page" id="pull-main">Pull</button>
    <button class="menu-buttons-home-page" id="legs-main">Legs</button>
</nav>
<div id="main" class="hidden">
    <div class="current-container">
        <div id="current-label">Current Workout</div>
        <div class="current-display">
            <div class='bubble-display' id="name"></div>
            <div class='labels' id="muscle-group">Workout</div>
            <div class='bubble-display' id="sets"></div>
            <div class='bubble-display' id="reps"></div>
            <div class='labels' id="sets-label">Sets</div>
            <div class='labels' id="reps-label">Reps</div>
        </div>
        
        <div class="buttons-container">
            <button id="begin">Begin Workout</button>
            <button id="skip">Skip</button>
            <button id="done">Done</button>
        </div>
    </div><!-- close current workout container -->
    <div class="completed-container">
        <div class="completed-workouts-title">Completed Workouts</div>
        <div id="completed-list">
            <div class="list-left"></div>
            <div class="list-right"></div>
        </div>
    </div><!-- close completed workouts container-->
</div> <!-- close main -->
</body>
</html>
