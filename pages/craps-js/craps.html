<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRAPS</title>
  <link rel="stylesheet" href="stylecraps.css">
  <script src="javacraps.js" defer></script>
</head>

<body>
<div id="main-area">
        <div id="staged-bet-chips"></div>

  <div class="table">
    <div class="bonus-container">
      <div id="small-2">2</div>
      <div id="small-3">3</div>
      <div id="small-4">4</div>
      <div id="small-5">5</div>
      <div id="small-6">6</div>
      <div class="bonus-box" id="first">All Small<br>30 to 1
        <div id="small-bonus-chips"></div>
        <button id="small-button"></button>
      </div>
      <div class="bonus-box" id="second">Make 'Em All<br>150 to 1
        <div id="all-bonus-chips"></div>
        <button id="all-button"></button>
      </div>
      <div class="bonus-box" id="third">All Tall<br>30 to 1
        <div id="tall-bonus-chips"></div>
        <button id="tall-button"></button>
      </div> 
      <div id="small-8">8</div>
      <div id="small-9">9</div>
      <div id="small-10">10</div>
      <div id="small-11">11</div>
      <div id="small-12">12</div>
    </div> <!-- Close bonus container-->
    <div class="middle-table">
      <div class="main-left">

      <div class="dont-come-row">
        <div class="dont-come-bet-container">
          <div id="dc-4">
            
          </div>
          <div id="dc-4-odds"></div>
          <button id="dc-4-button"></button>
        </div>

        <div class="dont-come-bet-container">
          <div id="dc-5"></div>
          <div id="dc-5-odds"></div>
          <button id="dc-5-button"></button>
        </div>

        <div class="dont-come-bet-container">
          <div id="dc-6"></div>
          <div id="dc-6-odds"></div>
          <button id="dc-6-button"></button>
        </div>

        <div class="dont-come-bet-container">
          <div id="dc-8"></div>
          <div id="dc-8-odds"></div>
          <button id="dc-8-button"></button>
        </div>

        <div class="dont-come-bet-container">
          <div id="dc-9"></div>
          <div id="dc-9-odds"></div>
          <button id="dc-9-button"></button>
        </div>

        <div class="dont-come-bet-container">
          <div id="dc-10"></div>
          <div id="dc-10-odds"></div>
          <button id="dc-10-button"></button>
        </div>
      </div>

        <div class="on-container">
          <img id='on-4' class="hidden" src="img/on.png">
          <img id='on-5' class="hidden" src="img/on.png">
          <img id='on-6' class="hidden" src="img/on.png">
          <img id='on-8' class="hidden" src="img/on.png">
          <img id='on-9' class="hidden" src="img/on.png">
          <img id='on-10' class="hidden" src="img/on.png">
        </div>
          <img id="off-puck" src="img/off.png">



      <div class="number-pb-container">
        
        
          <div class="come-bet-container">
            <div class="number-box">4</div>
            <div id="come-4">
            </div>
            <div id="come-4-odds"></div>
            <button id="number-box-4"></button>
          </div>
          
          <div class="come-bet-container">
            <div class="number-box">5</div>
            <div id="come-5"></div>
            <div id="come-5-odds"></div>
            <button id="number-box-5"></button>
          </div>

        <div class="come-bet-container">
          <div class="number-box">6</div>
          <div id="come-6"></div>
          <div id="come-6-odds"></div>
          <button id="number-box-6"></button>
        </div>
        
          <div class="come-bet-container">
            <div class="number-box">8</div>
            <div id="come-8"></div>
            <div id="come-8-odds"></div>
            <button id="number-box-8"></button>
          </div>

        
          <div class="come-bet-container">
            <div class="number-box">9</div>
            <div id="come-9"></div>
            <div id="come-9-odds"></div>
            <button id="number-box-9"></button>
          </div>
          
        
          <div class="come-bet-container">
            <div class="number-box">10</div>
            <div id="come-10"></div>
            <div id="come-10-odds"></div>
            <button id="number-box-10"></button>
          </div>
  
      <div class="place-boxes">
        <div id="place-4-chips"></div>
        <button id="place-4-button"></button>
      </div>

      <div class="place-boxes">
        <div id="place-5-chips"></div>
        <button id="place-5-button"></button>
      </div>
      <div class="place-boxes">
        <div id="place-6-chips"></div>
        <button id="place-6-button"></button>
      </div>
      <div class="place-boxes">
        <div id="place-8-chips"></div>
        <button id="place-8-button"></button>
      </div>
      <div class="place-boxes">
        <div id="place-9-chips"></div>
        <button id="place-9-button"></button>
      </div>
      <div class="place-boxes">
        <div id="place-10-chips"></div>
        <button id="place-10-button"></button>
      </div>
    
    </div> <!-- close dc-pb-->
            

        <div class="middle-field-container">
          <div class="dont-come-line">
            
            <div class="dont-come-label">Don't Come<br>
              <img src="img/dice/white_6.png" style="height: 35px; margin-top: 10px;">
              <img src="img/dice/white_6.png" style="height: 35px;">
            </div>
            <div id="dont-come-chips-display"></div>
            <button id="dont-come-line-button"></button>
      
          </div>


          <div class="come-field-container">

            <div class="come-line">
              <div class="come-label">C O M E</div>
              <div id="come-chips-display">

              </div>
              <button id="come-line-button"></button>
            </div>

            <div id="field">2 3 4 9 10 11 12<br>FIELD
              <div id="field-chips"></div>
              <button id="field-button"></button>
            </div>
          </div>

        </div>



<div class="pass-line-container">

          <div class="dont-pass">
            <div class="dont-pass-label"> Don't Pass Bar</div>
              <img src="img/dice/white_6.png" class="dont-dice">
              <img src="img/dice/white_6.png" class="dont-dice">
            
            <div id="dont-pass-chips"></div>
            <div id="dont-pass-odds-chips"></div>
            <button id="dont-pass-button"></button>
          </div>

        <div class="pass-line">PASS LINE
          <div id="pass-line-chips"></div>
          <button id="pass-line-button"></button>
        </div>

        <div class="pass-line-odds">
          <div id="pass-line-odds-chips"></div>
          <button id="pass-line-odds-button"></button>
        </div>
        <button id="roll-button" class="hidden">ROLL</button>
</div>
      </div> <!-- close main-left-->

      <div class="main-right">
        <button id="seven-bet"><h2>Seven</h2></button>
        <div class="side-bets-grid">
          <div id="hardways-6">
            <div class="side-bets-dice-display">
              <img src="img/dice/white_3.png" class="side-bet-dice-size">
              <img src="img/dice/white_3.png" class="side-bet-dice-size">
            </div>
            <div id="hw-6-text">9 to 1</div>
            <div id="hard-6-chips"></div>

          </div>
          <div id="hardways-10">
            <div class="side-bets-dice-display">
              <img src="img/dice/white_5.png" class="side-bet-dice-size">
              <img src="img/dice/white_5.png" class="side-bet-dice-size">
            </div>
            <div id="hw-10-text">7 to 1</div>
            <div id="hard-10-chips"></div>
          </div>
          <div id="hardways-8">
            <div class="side-bets-dice-display">
              <img src="img/dice/white_4.png" class="side-bet-dice-size">
              <img src="img/dice/white_4.png" class="side-bet-dice-size">
            </div>
            <div id="hw-8-text">9 to 1</div>
            <div id="hard-8-chips"></div>
          </div>
          <div id="hardways-4">
            <div class="side-bets-dice-display">
              <img src="img/dice/white_2.png" class="side-bet-dice-size">
              <img src="img/dice/white_2.png" class="side-bet-dice-size">
            </div>
            <div id="hw-4-text">7 to 1</div>
            <div id="hard-4-chips"></div>
          </div>

          <div id="horn-3">
            <div class="side-bets-dice-display">
              <img src="img/dice/white_2.png" class="side-bet-dice-size">
              <img src="img/dice/white_1.png" class="side-bet-dice-size">
            </div>
            <div id="horn-3-text">15 to 1</div>
            <div id="horn-3-chips"></div>
          </div>
          <div id="horn-12">
            <div class="side-bets-dice-display">
              <img src="img/dice/white_6.png" class="side-bet-dice-size">
              <img src="img/dice/white_6.png" class="side-bet-dice-size">
            </div>
            <div id="horn-12-text">30 to 1</div>
            <div id="horn-12-chips"></div>
          </div>
          <div id="horn-11">
            <div class="side-bets-dice-display">
              <img src="img/dice/white_5.png" class="side-bet-dice-size">
              <img src="img/dice/white_6.png" class="side-bet-dice-size">
            </div>
            <div id="horn-11-text">15 to 1</div>
            <div id="horn-11-chips"></div>
          </div>
          <div id="horn-2">
            <div class="side-bets-dice-display">
              <img src="img/dice/white_1.png" class="side-bet-dice-size">
              <img src="img/dice/white_1.png" class="side-bet-dice-size">
            </div>
            <div id="horn-2-text">30 to 1</div>
            <div id="horn-2-chips"></div>
          </div>
        </div> <!-- Close Side Bets Div Grid-->
        <div class="side-bets-button-grid">
          <button id="hard-6-button"></button>
          <button id="hard-10-button"></button>
          <button id="hard-8-button"></button>
          <button id="hard-4-button"></button>
          <button id="horn-3-button"></button>
          <button id="horn-12-button"></button>
          <button id="horn-11-button"></button>
          <button id="horn-2-button"></button>
        </div>
        <button id="any-craps"><h2>Any Craps</h2></button>
      </div> <!-- close main-right-->
    </div> <!-- Close middle container-->
  </div> <!-- Close table div-->
  


  <div id="dice-display">
    <img id='dice1' src="img/dice/red_1.png">
    <img id='dice2' src="img/dice/red_1.png">
  </div>

  <div id="bottom-container">
    <div class="bet-container">
      <div class="bet-control-buttons">
        
        <div class="control-column">
          <button id="increment1">
            <img src="img/increase.png" class="arrow increase" >
          </button>
          <div class="control-label">$1</div>
          <button id="decrement1">
            <img src="img/decrease.png" class="arrow decrease">
          </button>
        </div>

        <div class="control-column">
          <button id="increment5">
            <img src="img/increase.png" class="arrow increase" >
          </button>
          <div class="control-label">$5</div>
          <button id="decrement5">
            <img src="img/decrease.png" class="arrow decrease">
          </button>
        </div>

        <div class="control-column">
          <button id="increment25">
            <img src="img/increase.png" class="arrow increase" >
          </button>
          <div class="control-label">$25</div>
          <button id="decrement25">
            <img src="img/decrease.png" class="arrow decrease">
          </button>
        </div>

        <div class="control-column">
          <button id="increment100">
            <img src="img/increase.png" class="arrow increase" >
          </button>
          <div class="control-label">$100</div>
          <button id="decrement100">
            <img src="img/decrease.png" class="arrow decrease">
          </button>
        </div>

        <div class="control-column">
          <button id="clear-bet">Clear</button>
          <button id="pull-back-button">Pull</button>
        </div>
        

      </div>

      <div id="staged-bet-container">
        <div id="staged-bet"></div>
      </div>
    </div>
      

    <div class="bankroll-container">
      <div class="bankroll-label-on-table">B A N K  R O L L</div>
      <div id="bankroll-chips"></div>
    </div>
    
  </div> <!-- Close Bottom Container-->
  <div id="money-container">
  <div class="bankroll-label">Bankroll
    <div id="bankroll-amount">$500</div>
  </div>
  <div class = 'money-label'>Money On Table
    <div id="money-on-table">$0</div>
  </div>
</div> <!--close money container-->
<div id="message-box">
  <div id="message-1"></div>
  <div id="message-2"></div>
  <div id="message-3"></div>
  <div id="message-4"></div>
  <div id="message-5"></div>
</div>
<button id="show-money-button">
  <img src="img/double_arrow.png" id="double-arrow">
</button>
</div> <!-- close main-area-->
